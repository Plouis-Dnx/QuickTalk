<div (click)="getMessages()"
    [ngClass]="{ 'bg-yellow-100': isSelected }"
    class="flex items-center gap-3 px-6 py-3 cursor-pointer hover:bg-yellow-50 transition-colors">

    <!-- Avatar -->
    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-yellow-200 font-lexend font-bold text-gray-900 shrink-0">
        {{ contactName.charAt(0).toUpperCase() }}
    </div>

    <!-- Name -->
    <span class="font-dm-sans text-sm font-medium text-gray-900">
        {{ contactName }}
    </span>

</div>
