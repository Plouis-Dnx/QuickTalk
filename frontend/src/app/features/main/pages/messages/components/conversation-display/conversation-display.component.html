<div class="h-full flex flex-col p-4 overflow-y-auto">
    @if (!conversationSelected()) {
        <div class="text-center text-gray-400">
            No conversation selected
        </div>
    }
    @else {
        <div class="flex-1">
            @if (messages | async; as msgs) {
                @for (message of msgs; track message._id) {
                    <div class="chat" 
                        [class.chat-start]="message.senderId.toString() !== me._id.toString()"
                        [class.chat-end]="message.senderId.toString() === me._id.toString()"
                    >
                        <div class="chat-bubble bg-yellow-200">{{message.content}}</div>
                    </div>
                }
                @empty {
                    <p class="text-gray-500 text-center mt-10">No message</p>
                }
            }
        </div>

        <div class="bg-yellow-200 p-2 rounded-xl shadow-xl">
            <input 
                [(ngModel)]="newMessage" 
                (keydown.enter)="sendMessage()"
                type="text" 
                placeholder="Message" 
                class="input border border-yellow-300 rounded-md w-full" />
        </div>
    }
</div>
