<div class="card card-border border border-gray-500 bg-yellow-100 rounded-2xl w-96">
    <div class="card-body">

        <div class="flex items-center gap-4">
            <div class="avatar">
                <div class="w-24 rounded-full">
                    <img src="https://images.assetsdelivery.com/compings_v2/tanyadanuta/tanyadanuta2006/tanyadanuta200600030.jpg" />
                </div>
            </div>
            <h2 class="card-title">{{ user.username }}</h2>
        </div>

        @if (user.biography) {
            <p class="italic text-gray-500">{{ user.biography }}</p>
        }
        @else {
            <p class="italic text-gray-500">Hi! I'm new</p>
        }

        <div class="card-actions justify-end">
            <button (click)="createConversation()" class="btn btn-primary rounded border-0 bg-yellow-200 shadow-md hover:shadow-xl">Send me a message</button>
        </div>

    </div>
</div>
