<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="login.component.css" rel="stylesheet">
    <title>QuickTalk - Login</title>
</head>
<body>
    <!-- Wrapper plein écran -->
    <div class="relative h-screen w-screen overflow-hidden bg-white">

    <!-- Wavy background SVG -->
    <svg
        class="absolute inset-0 h-full w-full"
        viewBox="0 0 1440 600"
        preserveAspectRatio="xMidYMid slice"
        xmlns="http://www.w3.org/2000/svg"
    >
        <rect width="1440" height="600" fill="white"/>
        <path class="wave3"
        d="M0,160 C300,120 600,200 900,160 C1150,120 1300,180 1440,155 L1440,600 L0,600 Z"
        fill="#fdf6c3" opacity="0.8"/>
        <path class="wave2"
        d="M0,130 C250,80 500,170 750,130 C1000,80 1200,150 1440,120 L1440,600 L0,600 Z"
        fill="#f9ef9a" opacity="0.85"/>
        <path class="wave1"
        d="M0,90 C200,50 400,130 600,90 C800,50 1000,110 1440,80 L1440,600 L0,600 Z"
        fill="#f5e06e" opacity="0.9"/>
    </svg>

    <!-- Titre centré -->
    <div class="absolute inset-0 flex items-center justify-center">
        <h1 class="font-lexend text-[clamp(4rem,13vw,10rem)] font-extrabold tracking-tight text-gray-900">
        QuickTalk
        </h1>
    </div>

    <!-- Bouton en pied de page -->
    <div class="absolute bottom-10 left-0 right-0 flex justify-center">
        <button
        (click)="onLoginClick()"
        class="flex items-center gap-3 rounded-full border border-gray-200 bg-white px-7 py-3 font-dm-sans text-base font-medium text-gray-900 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md active:translate-y-0"
        >
        <!-- Google icon -->
        <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Se connecter avec Google
        </button>
    </div>

    </div>
</body>
</html>
